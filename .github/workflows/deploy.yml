name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minifiers
        run: npm install -g html-minifier-terser terser clean-css-cli php-minify

      - name: Minify assets
        run: |
          # Minify HTML
          find reporting www collector -name "*.html" | while read f; do
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --minify-css true \
              --minify-js true \
              "$f" -o "$f"
          done

          # Minify JS
          find reporting www collector -name "*.js" ! -name "*.min.js" | while read f; do
            terser "$f" -o "$f" --compress --mangle
          done

          # Minify CSS
          find reporting www collector -name "*.css" ! -name "*.min.css" | while read f; do
            cleancss -o "$f" "$f"
          done

          # Minify PHP
          find reporting www collector -name "*.php" | while read f; do
            php-minify "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts

          # Deploy each site
          rsync -avz --delete reporting/ $SERVER_USER@$SERVER_IP:/var/www/reporting.cse135hw1.online/
          rsync -avz --delete www/ $SERVER_USER@$SERVER_IP:/var/www/cse135hw1.online/
          rsync -avz --delete www/ $SERVER_USER@$SERVER_IP:/var/www/html
          rsync -avz --delete collector/ $SERVER_USER@$SERVER_IP:/var/www/collector.cse135hw1.online/